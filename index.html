<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modulux Homes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      const shouldResetHomeScroll = window.location.pathname === '/' || window.location.pathname === '/home'

      if (shouldResetHomeScroll && 'scrollRestoration' in window.history) {
        window.history.scrollRestoration = 'manual'
      }

      if (shouldResetHomeScroll) {
        const resetHomeScroll = () => {
          const scrollTarget = document.scrollingElement || document.documentElement || document.body

          if (scrollTarget) {
            scrollTarget.scrollTop = 0
            scrollTarget.scrollLeft = 0
          }

          document.documentElement.scrollTop = 0
          document.body.scrollTop = 0
          window.scrollTo(0, 0)
        }

        resetHomeScroll()
        window.addEventListener('beforeunload', resetHomeScroll)
        window.addEventListener('pagehide', resetHomeScroll)
        window.addEventListener('pageshow', () => {
          resetHomeScroll()
          requestAnimationFrame(() => resetHomeScroll())
          setTimeout(resetHomeScroll, 120)
          setTimeout(resetHomeScroll, 320)
        })
        window.addEventListener('load', () => {
          resetHomeScroll()
          requestAnimationFrame(() => resetHomeScroll())
          setTimeout(resetHomeScroll, 120)
          setTimeout(resetHomeScroll, 320)
        })
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
